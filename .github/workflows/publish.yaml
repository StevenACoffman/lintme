name: Build and Publish

permissions:
  contents: write # for release

on:
  workflow_dispatch:
    inputs:
      semverbump:
        description: "Which version to bump by"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  backend-tests:
    name: "Go Build/Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
          cache-dependency-path: "**/*.sum"
      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  tag:
    name: "Publish Tag"
    runs-on: ubuntu-latest
    needs:
      - backend-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.semverbump }}
          tag_prefix: "v"

  goreleaser:
    name: "Release"
    needs:
      - backend-tests
      - tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}